global:
  scrape_interval: 10s # Scrape targets every 10 seconds for fast lab feedback


# Tell Prometheus where to send alerts
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'

# We will add our alert rules file here in Step Two
rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the victim application
  - job_name: 'victim_app'
    static_configs:
      - targets: ['victim_app:9100']

  # Scrape cAdvisor to monitor the containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'java_app'
    metrics_path: '/actuator/prometheus' # Chemin classique pour les métriques JVM
    static_configs:
      - targets: ['java_app:8080']

  - job_name: 'FBB_app'
    static_configs:
      - targets: ['FBB_app:9898']